# GitHub Actions CI Workflow for Terminalog
# Runs on push to main and pull requests to verify build integrity
# Tests Linux (amd64/arm64) builds

name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  # ============================================
  # Test Go Code
  # ============================================
  test:
    name: Test Go Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Run tests
        run: go test -v -race ./...

      - name: Check Go modules
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

  # ============================================
  # Build Frontend
  # ============================================
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Verify frontend build output
        run: |
          if [ ! -d "frontend/out" ]; then
            echo "Error: Frontend build output not found"
            exit 1
          fi
          if [ ! -f "frontend/out/index.html" ]; then
            echo "Error: index.html not found in frontend output"
            exit 1
          fi
          echo "Frontend build successful"

  # ============================================
  # Build Linux Binaries
  # ============================================
  build-linux:
    name: Build Linux (${{ matrix.arch }})
    needs: [test, build-frontend]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: amd64
            goarch: amd64
          - arch: arm64
            goarch: arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Prepare static files for embedding
        run: |
          rm -rf pkg/embed/static
          mkdir -p pkg/embed/static
          cp -r frontend/out/* pkg/embed/static/

      - name: Build binary
        env:
          CGO_ENABLED: 0
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p bin
          go build -ldflags="-s -w" \
            -o bin/terminalog-linux-${{ matrix.arch }} \
            cmd/terminalog/main.go

      - name: Verify binary
        run: |
          if [ ! -f "bin/terminalog-linux-${{ matrix.arch }}" ]; then
            echo "Error: Binary not found"
            exit 1
          fi
          ls -lh bin/terminalog-linux-${{ matrix.arch }}

  # ============================================
  # Build Summary
  # ============================================
  build-summary:
    name: Build Summary
    needs: build-linux
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check build status
        run: |
          if [ "${{ needs.build-linux.result }}" == "success" ]; then
            echo "✅ All Linux builds completed successfully"
            echo "- Linux amd64: OK"
            echo "- Linux arm64: OK"
          else
            echo "❌ Build failed"
            exit 1
          fi