name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  build-frontend:
    name: Build Frontend Export
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Verify frontend export
        run: |
          if [ ! -d "frontend/out" ]; then
            echo "Error: frontend/out not found"
            exit 1
          fi
          if [ ! -f "frontend/out/index.html" ]; then
            echo "Error: frontend/out/index.html not found"
            exit 1
          fi
          mkdir -p pkg/embed/static
          cp -a frontend/out/. pkg/embed/static/

      - name: Upload embedded static files
        uses: actions/upload-artifact@v4
        with:
          name: embedded-static
          path: pkg/embed/static
          retention-days: 1

  test:
    name: Test Go Code
    needs: build-frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Download embedded static files
        uses: actions/download-artifact@v4
        with:
          name: embedded-static
          path: pkg/embed/static

      - name: Run tests
        run: go test -v -race ./...

      - name: Check Go modules
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    needs: [build-frontend, test]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Download embedded static files
        uses: actions/download-artifact@v4
        with:
          name: embedded-static
          path: pkg/embed/static

      - name: Build binary
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p bin
          go build -ldflags="-s -w" \
            -o bin/terminalog-${{ matrix.goos }}-${{ matrix.goarch }} \
            cmd/terminalog/main.go

      - name: Verify binary
        run: |
          if [ ! -f "bin/terminalog-${{ matrix.goos }}-${{ matrix.goarch }}" ]; then
            echo "Error: Binary not found"
            exit 1
          fi
          ls -lh bin/terminalog-${{ matrix.goos }}-${{ matrix.goarch }}

  build-summary:
    name: Build Summary
    needs: build
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check build status
        run: |
          if [ "${{ needs.build.result }}" == "success" ]; then
            echo "All cross-platform builds completed successfully"
          else
            echo "Build failed"
            exit 1
          fi
