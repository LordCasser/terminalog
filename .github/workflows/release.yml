name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-frontend:
    name: Build Frontend Export
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Prepare embedded static files
        run: |
          mkdir -p pkg/embed/static
          cp -a frontend/out/. pkg/embed/static/

      - name: Upload embedded static files
        uses: actions/upload-artifact@v4
        with:
          name: embedded-static
          path: pkg/embed/static
          retention-days: 1

  build-release:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    needs: build-frontend
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive: tar.gz
          - goos: linux
            goarch: arm64
            archive: tar.gz
          - goos: linux
            goarch: riscv64
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            archive: tar.gz
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: false

      - name: Download embedded static files
        uses: actions/download-artifact@v4
        with:
          name: embedded-static
          path: pkg/embed/static

      - name: Get version info
        id: version
        run: |
          echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          echo "date=$(date -u '+%Y-%m-%d_%H:%M:%S')" >> $GITHUB_OUTPUT

      - name: Build binary
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p bin
          BINARY="terminalog-${{ steps.version.outputs.version }}-${{ matrix.goos }}-${{ matrix.goarch }}"
          go build -ldflags="-s -w \
            -X main.version=${{ steps.version.outputs.version }} \
            -X main.buildDate=${{ steps.version.outputs.date }}" \
            -o "bin/${BINARY}" \
            cmd/terminalog/main.go

      - name: Create archive
        run: |
          cd bin
          ARCHIVE="terminalog-${{ steps.version.outputs.version }}-${{ matrix.goos }}-${{ matrix.goarch }}"
          BINARY="${ARCHIVE}"
          tar -czf "${ARCHIVE}.tar.gz" "${BINARY}"
          sha256sum "${ARCHIVE}.tar.gz" > "${ARCHIVE}.tar.gz.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            bin/*.tar.gz
            bin/*.tar.gz.sha256
          retention-days: 7

  release:
    name: Create Release
    needs: build-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -laR artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find artifacts -name "*.tar.gz" -exec cp {} release-assets/ \;
          find artifacts -name "*.sha256" -exec cp {} release-assets/ \;
          ls -la release-assets/

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -n "$PREV_TAG" ]; then
            echo "Changes since $PREV_TAG:" > CHANGELOG.md
            echo "" >> CHANGELOG.md
            git log --pretty=format:"- %s (%h)" $PREV_TAG..HEAD >> CHANGELOG.md
          else
            echo "Initial release" > CHANGELOG.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          body_path: CHANGELOG.md
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
          generate_release_notes: true
