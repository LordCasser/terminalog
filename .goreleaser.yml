# GoReleaser 配置 - Terminalog
# 构建流程：前端编译 → 复制到 embed 目录 → 后端编译嵌入

project_name: terminalog

before:
  hooks:
    # 1. 构建前端
    - sh -c "cd frontend && npm install && npm run build"
    # 2. 复制静态文件到 embed 目录
    - sh -c "rm -rf pkg/embed/static && mkdir -p pkg/embed/static && cp -r frontend/out/* pkg/embed/static/"
    # 3. 清理 Go 测试缓存
    - go mod tidy

builds:
  - id: terminalog
    main: ./cmd/terminalog
    binary: terminalog
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
      - riscv64
    goarm:
      - 6
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    env:
      - CGO_ENABLED=0
    ignore:
      - goos: windows
        goarch: arm64
      - goos: darwin
        goarch: riscv64
      - goos: windows
        goarch: riscv64

archives:
  - id: default
    builds:
      - terminalog
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE*
      - configs/config.toml.example

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - Merge pull request
      - Merge branch

release:
  github:
    owner: lordcasser
    name: terminalog
  draft: false
  prerelease: auto
  mode: replace

# 快照构建（用于测试）
snapshot:
  name_template: "{{ incpatch .Version }}-next"

# Homebrew Tap（可选）
brews:
  - name: terminalog
    repository:
      owner: lordcasser
      name: homebrew-tap
    folder: Formula
    homepage: "https://github.com/lordcasser/terminalog"
    description: "Terminal-style Blog System with embedded frontend"
    license: MIT
    test: |
      system "#{bin}/terminalog --version"
    install: |
      bin.install "terminalog"